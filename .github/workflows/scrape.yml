name: Scholarship Scraper

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run Scraper
        # Ensure this filename matches your Python file exactly
        run: python scholarship_monitor.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "ScholarshipBot"
          git config --global user.email "bot@example.com"
          git add scholarship_master_list.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scholarship data" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
